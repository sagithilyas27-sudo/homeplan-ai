<!DOCTYPE html>
<html>
<head>
<title>HomePlanAI</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f0f4f8;
margin:0;
}

header{
background:#1565c0;
color:white;
padding:20px;
}

button{
padding:12px 20px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

input{
padding:10px;
width:250px;
margin:15px;
}

#output{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🏠 HomePlanAI</h1>
<p>AI House Planning Website</p>
</header>

<br>

<input id="plot" placeholder="Enter plot size (30x40)">

<br>

<button onclick="plan()">Generate Plan</button>

<div id="output"></div>

<script>
function plan(){
let x=document.getElementById("plot").value;

document.getElementById("output").innerHTML=
"Plan for "+x+
": 2 Bedrooms, Hall, Kitchen and 2 Bathrooms.";
}
</script>

</body>
</html>
